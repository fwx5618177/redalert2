[General]
discordUrl=https://discord.com
csfFile = general.csf

# Where game resources are located
gameresBaseUrl=/cdn/game-res/v2/
mapsBaseUrl=/cdn/maps/
modsBaseUrl=/cdn/mods/
# gameResArchiveUrl is loaded by the GameRes auto-import button.
# Upstream https://download.ra2web.com/full-pack.7z (140 MB) does not send
# Access-Control-Allow-Origin headers, so the browser blocks the cross-origin
# fetch. Mirror it locally with `pnpm fetch:gamepack` — the file lands in
# apps/web/public/cdn/ (gitignored) and Vite serves it at the path below.
gameResArchiveUrl=/cdn/full-pack.7z
patchNotesUrl=//www.ra2web.com/patch-notes.html
ladderRulesUrl=//www.ra2web.com/ladder-rules.html
modSdkUrl=https://github.com/ra2web/mod-sdk
breakingNewsUrl=/breaking-news.html
oldClientsBaseUrl=/old/
quickMatchEnabled=yes
botsEnabled=yes
debugLogging=wol
defaultLanguage=zh-CN

viewport.width=1024
viewport.height=768
