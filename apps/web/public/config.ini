[General]
discordUrl=https://discord.com
csfFile = general.csf

# Where game resources are located.
# /cdn/full-pack/ ships pre-extracted .mix files (populated via
# `pnpm fetch:gamepack`). On first launch GameRes auto-fetches the
# essential mixes from here into IndexedDB, skipping the import
# dialog entirely. Subsequent launches load straight from IndexedDB.
gameresBaseUrl=/cdn/full-pack/
mapsBaseUrl=/cdn/maps/
modsBaseUrl=/cdn/mods/
patchNotesUrl=//www.ra2web.com/patch-notes.html
ladderRulesUrl=//www.ra2web.com/ladder-rules.html
modSdkUrl=https://github.com/ra2web/mod-sdk
breakingNewsUrl=/breaking-news.html
oldClientsBaseUrl=/old/
quickMatchEnabled=yes
botsEnabled=yes
debugLogging=wol
defaultLanguage=zh-CN

viewport.width=1024
viewport.height=768
