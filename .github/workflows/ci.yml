name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Lint (boundary direction)
        run: pnpm lint

      # Typecheck is gated against `.typecheck-baseline.json#maxErrors`.
      # Pre-existing pre-monorepo debt is allowed; new code adding more
      # type errors fails CI. To lower the baseline, fix errors locally
      # then commit a smaller `maxErrors` value.
      - name: Typecheck (regression gate)
        run: node scripts/check-typecheck-baseline.mjs

      - name: Production build
        # gamepack (apps/web/public/cdn/full-pack.7z, 140 MB) is gitignored;
        # CI just verifies the build compiles and stays under bundle caps,
        # so skip the gamepack-presence guard. Production deploys MUST
        # populate the file via `pnpm fetch:gamepack` before building.
        env:
          SKIP_GAMEPACK_CHECK: '1'
        run: pnpm build

      # Bundle size gated against `.bundle-baseline.json`. CI fails if any
      # tracked chunk exceeds its `maxBytes`. Tighten or widen via deliberate
      # edits to the JSON file. dist/stats.html (rollup-plugin-visualizer
      # treemap) is uploaded as artifact for visual inspection.
      - name: Bundle size (regression gate)
        run: node scripts/check-bundle-baseline.mjs

      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: apps/web/dist/stats.html
          retention-days: 7

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke flows
        run: |
          set -e
          pnpm debug:test-entries
          pnpm debug:viewport
          pnpm debug:options
          pnpm debug:storage-explorer
          pnpm debug:game-res-init

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: .artifacts/
          retention-days: 7
